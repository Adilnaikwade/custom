<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Question for You</title>
    <style>
        /* EDIT COLORS HERE */
        :root { --bg-color: #ffe4e6; --heart-color: #e11d48; --text-color: #881337; }
        
        body { background: var(--bg-color); color: var(--text-color); font-family: 'Georgia', serif; text-align: center; overflow: hidden; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .container { width: 90%; max-width: 500px; padding: 20px; transition: opacity 0.5s; }
        button { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; border: none; border-radius: 25px; margin: 10px; transition: 0.3s; }
        .yes-btn { background: #f43f5e; color: white; }
        .no-btn { background: #a8a29e; color: white; position: absolute; }
        #heart-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .heart { position: absolute; color: var(--heart-color); font-size: 20px; animation: float 4s linear infinite; }
        @keyframes float { 0% { transform: translateY(100vh); opacity: 1; } 100% { transform: translateY(-10vh); opacity: 0; } }
    </style>
</head>
<body>

    <div id="heart-container"></div>

    <div id="step1" class="container">
        <h1>Hi Sadushhh, do you love me? ❤️</h1> <button class="yes-btn" onclick="nextStep('step2')">YES</button>
        <button class="no-btn" onmouseover="moveBtn(this)">NO</button>
    </div>

    <div id="step2" class="container" style="display:none;">
        <h1>Will you marry me? 💍</h1> <button class="yes-btn" onclick="nextStep('step3')">YES</button>
        <button class="no-btn" onmouseover="moveBtn(this)">NO</button>
    </div>

    <div id="step3" class="container" style="display:none;">
        <h1>You just made me the happiest person in the world! ❤️</h1> <img src="https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExMjM3N284d2YyNXJ1bDJqc2htbHMwZDlmbndtcmFpMDVwd21ndG92bCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/RB46T9ysjzDEs/200.webp" width="100%">
    </div>

    <script>
        function nextStep(stepId) {
            document.querySelectorAll('.container').forEach(div => div.style.display = 'none');
            document.getElementById(stepId).style.display = 'block';
        }

        function moveBtn(btn) {
            btn.style.left = Math.random() * 80 + '%';
            btn.style.top = Math.random() * 80 + '%';
        }

        // Floating hearts generator
        setInterval(() => {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.className = 'heart';
            heart.style.left = Math.random() * 100 + '%';
            document.getElementById('heart-container').appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }, 500);
    </script>
</body>
</html>
